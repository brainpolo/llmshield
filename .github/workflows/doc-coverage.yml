name: Documentation Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  doc-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Check docstring coverage with Ruff (fail on any issues)
        run: |
          # Run ruff with docstring rules specifically
          uv tool run ruff check llmshield/ --select D --statistics

          # Check for any docstring issues and fail if found
          DOC_ISSUES=$(uv tool run ruff check llmshield/ --select D --quiet | wc -l || echo 0)
          if [ "$DOC_ISSUES" -gt 0 ]; then
            echo "❌ Found $DOC_ISSUES docstring issues. Perfect documentation coverage required."
            uv tool run ruff check llmshield/ --select D  # Show the issues
            exit 1
          fi
          echo "✅ Perfect docstring coverage achieved (0 issues)"

      - name: Generate docstring summary
        if: always()
        run: |
          # Display summary
          echo "## Docstring Coverage Summary"
          echo "Files checked: $(find llmshield -name '*.py' -not -path '*/tests/*' | wc -l)"
          echo "Docstring issues: $(uv tool run ruff check llmshield/ --select D --quiet | wc -l || echo 0)"
